# Task 41 — Accelerate config for Northflank H100 (single-node, single-GPU)
#
# Northflank GPU Request Form (hackathon):
#   https://docs.google.com/forms/d/e/1FAIpQLSd2bxx5jAXE8D3FjF7OVekSxwpDVMf1LWE3Z-g4FZoDJ4W6xg/viewform
#
# Northflank Docs:
#   https://northflank.notion.site/Northflank-Docs-OpenEnv-Hackathon-2496d14c785180c6a595e6776e3118ba
#
# Usage:
#   accelerate launch --config_file accelerate_config.yaml train_negotiate.py --vllm-mode colocate
#
# For multi-GPU (e.g. 2× H100 on Northflank):
#   Change num_processes to 2 and distributed_type to MULTI_GPU

compute_environment: LOCAL_MACHINE
distributed_type: NO          # single GPU; change to MULTI_GPU for multi-GPU nodes
mixed_precision: bf16          # H100 supports bf16 natively
num_processes: 1
num_machines: 1
machine_rank: 0
main_process_ip: null
main_process_port: null
main_training_function: main
downcast_bf16: "no"
gpu_ids: all
rdzv_backend: static
same_network: true
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
